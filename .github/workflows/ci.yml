name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Check, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy without benchmark suite
        run: |
          cargo clippy -p noema-core --lib -- -D warnings
          cargo clippy -p noema-core --test s3_fake --test enterprise_policy -- -D warnings
          cargo clippy -p noema --all-targets -- -D warnings
          cargo clippy -p noema-mcp --all-targets -- -D warnings
          cargo clippy -p noema-server --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Test workspace without benchmark suite
        run: |
          cargo test -p noema-core --lib
          cargo test -p noema-core --test s3_fake --test enterprise_policy
          cargo test -p noema -- --skip bench
          cargo test -p noema-mcp
          cargo test -p noema-server
